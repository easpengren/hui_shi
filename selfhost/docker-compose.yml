services:
  kokoro:
    build:
      context: ../kokoro-web
      dockerfile: docker/cpu/Dockerfile
    restart: unless-stopped
    ports:
      - "8880:8080"
    environment:
      KOKORO_API_KEY: ${KOKORO_API_KEY:-}
    volumes:
      - kokoro-models:/app/api/src/models

volumes:
  kokoro-models:
