name: Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: self-hosted
    env:
      HOME: /home/runner
      ANDROID_HOME: /opt/android-sdk
      PUB_CACHE: /home/runner/.pub-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install Flutter dependencies
        run: /opt/flutter/bin/flutter pub get

      # No sign-in / secrets — a plain release build signed with the debug key is
      # fine for sideloading.
      - name: Build release APK
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "Building #${{ github.run_number }} · $SHA · $DATE"
          /opt/flutter/bin/flutter build apk --release \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"

      - name: Publish APK
        run: |
          DEST=/root/hetzner_hosting_setup/srv/data/www/confucius
          mkdir -p "$DEST"
          cp build/app/outputs/flutter-apk/app-release.apk "$DEST/lu_ji.apk"
          echo "APK available at https://confucius.monolithstudio.art/downloads/lu_ji.apk"

      # Update manifest for a future in-app updater (mirrors confucius/sunbin).
      - name: Publish update manifest
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DEST=/root/hetzner_hosting_setup/srv/data/www/confucius
          cat > "$DEST/lu_ji-latest.json" <<JSON
          {
            "version_code": ${{ github.run_number }},
            "version_name": "1.0.${{ github.run_number }}",
            "apk_url": "https://confucius.monolithstudio.art/downloads/lu_ji.apk",
            "notes": "$SHA",
            "published_at": "$DATE"
          }
          JSON
          echo "Manifest: $(cat "$DEST/lu_ji-latest.json")"
