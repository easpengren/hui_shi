name: lu_ji
description: "Lu Ji - Offline TTS reader with Piper/System TTS, PDF/EPUB support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # File picking
  file_picker: ^8.0.0

  # Document parsing
  epubx: ^4.0.0

  # Audio playback (for Piper WAV output)
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # System TTS — wraps Android TextToSpeech + iOS AVSpeechSynthesizer
  flutter_tts: ^4.0.2

  # Piper offline TTS via sherpa-onnx VITS
  sherpa_onnx: ^1.10.28

  # Model download + extraction
  http: ^1.2.2
  archive: ^3.4.10

  # Storage & state
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  provider: ^6.1.2
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  scrollable_positioned_list: ^0.3.8

  cupertino_icons: ^1.0.8
  pdfrx: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

